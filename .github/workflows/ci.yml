name: Build and Validate

# Trigger on every push and pull request to any branch
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Restore, Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Install the correct .NET SDK version
      - name: Setup .NET 6
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "6.0.x"

      # Step 3 — Restore NuGet dependencies
      - name: Restore dependencies
        run: dotnet restore SecurityAwarenessBot/SecurityAwarenessBot.csproj

      # Step 4 — Build in Release mode, fail fast on warnings-as-errors
      - name: Build (Release)
        run: |
          dotnet build SecurityAwarenessBot/SecurityAwarenessBot.csproj \
            --configuration Release \
            --no-restore

      # Step 5 — Publish a self-contained artefact to confirm no missing assets
      - name: Publish
        run: |
          dotnet publish SecurityAwarenessBot/SecurityAwarenessBot.csproj \
            --configuration Release \
            --no-build \
            --output ./publish
